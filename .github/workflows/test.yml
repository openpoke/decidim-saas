name: "[CI] Decidim SaaS"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

env:
  RUBY_VERSION: 3.3
  NODE_VERSION: 22.14.0
  RAILS_ENV: test
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: postgres
  DATABASE_HOST: localhost
  RUBYOPT: '-W:no-deprecated'
  CHROME_VERSION: 139.0.7258.66

jobs:
  tests:
    name: Tests SaaS
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_PASSWORD: postgres
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: |
          sudo apt-get update; sudo apt-get -f install imagemagick
          
      - uses: nanasess/setup-chromedriver@v2
        with:
          chromedriver-version: ${{ env.CHROME_VERSION }}

      - name: List Chrome
        run: apt list --installed | grep chrome
    
      - name: Remove Chrome
        run: sudo apt remove google-chrome-stable
    
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: ${{ env.CHROME_VERSION }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - run: bundle exec rubocop -P
        name: Lint Ruby files

      - name: Setup & create Database
        run: |
          bundle exec rails db:create db:schema:load

      - name: Precompile assets
        run: |
          npm ci
          bundle exec rake assets:precompile

      - name: Run Application RSpec
        run: bundle exec rspec spec/

      - name: Run Application With Modules Active RSpec
        run: bundle exec rspec spec/saas_modules_spec.rb
        env:
          WITH_EXTRA_USER_FIELDS: 1

      - name: Run Som Mobilitat RSpec
        run: bundle exec rspec decidim-saas-som_mobilitat/spec/
        env:
          WITH_SOM_MOBILITAT: 1

      - name: Run Clean Clothes RSpec
        run: bundle exec rspec decidim-saas-clean_clothes/spec/
        env:
          WITH_CLEAN_CLOTHES: 1

      - name: Run EHU Agora RSpec
        run: bundle exec rspec decidim-saas-ehu_agora/spec/
        env:
          WITH_EHU_AGORA: 1

      - name: Run Ateneu Bcn RSpec
        run: bundle exec rspec decidim-saas-ateneu_bcn/spec/
        env:
          WITH_ATENEU_BCN: 1

      - name: Run Vivaio Delle Idee RSpec
        run: bundle exec rspec decidim-saas-vivaio_delle_idee/spec/
        env:
          WITH_VIVAIO_DELLE_IDEE: 1
