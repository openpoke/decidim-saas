name: "[CI] Decidim SaaS"
on:
  push:
    branches:
      - main
  pull_request:

env:
  RUBY_VERSION: 3.3
  NODE_VERSION: 18.17.1
  RAILS_ENV: test
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: postgres
  DATABASE_HOST: localhost
  RUBYOPT: '-W:no-deprecated'
  CHROME_VERSION: 139.0.7258.66

jobs:
  tests:
    name: Tests SaaS
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_PASSWORD: postgres
      redis:
        image: redis:3.2-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - run: |
          sudo apt-get update; sudo apt-get -f install wkhtmltopdf imagemagick
          
      - uses: nanasess/setup-chromedriver@v2
        with:
          chromedriver-version: ${{ env.CHROME_VERSION }}

      - name: List Chrome
        run: apt list --installed | grep chrome
    
      - name: Remove Chrome
        run: sudo apt remove google-chrome-stable
    
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: ${{ env.CHROME_VERSION }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - run: bundle exec rubocop -P
        name: Lint Ruby files

      - name: Setup & create Database
        run: |
          bundle exec rails db:create db:schema:load

      - name: Precompile assets
        run: |
          npm ci
          bundle exec rake assets:precompile

      - name: Run Application RSpec
        run: bundle exec rspec spec/

#      - name: Run Application With Modules Active RSpec
#        run: bundle exec rspec spec/saas_modules_spec.rb
#        env:
#          WITH_EXTRA_USER_FIELDS: 1
