      vertical_scroll:
        name: "Scorrimento verticale"
        block_1:
          title: "Quali scelte servono davvero per migliorare l'Italia nei prossimi cinque anni?"
          description: Con <strong>Decidiamo</strong>, cittadine e cittadini aiutano <strong>AVS</strong> a decidere quali sono le priorità per il nostro futuro, grazie a proposte condivise, confronto aperto e interazione pubblica e tracciabile.
          participate_button_text: Partecipa ora
          fqa_button_text: Come funziona
          extra_text: Una piattaforma aperta, trasparente e partecipata per costruire insieme il programma delle prossime elezioni politiche.
        block_2:
          title: Qui non vieni a guardare. Vieni a costruire.
          description: |-
            Troppo spesso i programmi si leggono solo alla fine, quando sono già stati scritti.
            <strong>Decidiamo</strong> nasce con uno spirito totalmente differente: aprire prima il confronto, ascoltare chi vive ogni giorno in prima persona problemi reali, raccogliere proposte, migliorarle insieme e trasformarle in scelte politiche.<br><br>
            Per noi partecipare non significa riempire una bacheca di opinioni.
            Significa <strong>darsi un metodo</strong>, discutere nel merito e costruire un programma più forte, più utile, più giusto.<br><br> Per noi partecipare non significa riempire una bacheca di opinioni, significa lavorare collettivamente.<br><br>
            <strong>Non conta chi scrive di più. Conta chi aiuta a costruire meglio.</strong>
        block_3:
          title: Come funziona
          description: |-
            <strong>1. Scegli le priorità</strong><br>
            Entra nei temi che ritieni più urgenti per il futuro del Paese: clima, lavoro, diritti, salute, scuola, casa, mobilità, welfare, pace, democrazia e molti altri.<br><br>
            <strong>2. Fai una proposta</strong><br>
            Porta un'idea concreta, un bisogno del tuo territorio, una soluzione possibile. Anche poche righe possono essere l'inizio di una proposta importante.<br><br>
            <strong>3. Commenta e aiutaci a migliorare</strong><br>
            Le proposte si discutono, si commentano, si possono emendare e rafforzare. Il confronto serve a far emergere le idee migliori,  non a fare rumore.<br><br>
            <strong>4. Segui il percorso fino alla sintesi</strong><br>
            Ogni contributo utile entra in un percorso trasparente di lettura, confronto e sintesi. Così puoi vedere come le idee raccolte non finiscono in un contenitore vuoto o senza risposte, ma contribuiscono alla costruzione del programma finale.<br><br>
            Questo significa una cosa semplice:<br>
            <strong>chi partecipa può capire non solo cosa propone, ma anche che uso viene fatto delle proposte.</strong>
          themes_button_text: Entra nei temi
        block_4:
          title: Perché partecipare
          description: |-
            Perché il futuro non si delega in silenzio.<br>
            Perché chi vive i problemi spesso conosce anche le soluzioni.<br>
            Perché un programma più credibile nasce dall'incontro tra visione politica ed esperienza concreta.<br>
            Perché serve un'Italia più giusta, ecologica, libera e vicina alle persone.<br>
            Perché decidere insieme è il modo migliore per cominciare a cambiare davvero le cose.<br>
        block_5:
          title: Questa piattaforma è aperta a tutte e tutti
          description: |-
            A chi ha una proposta precisa.<br>
            A chi vuole segnalare una priorità.
            A chi parte da un problema concreto del proprio territorio.<br>
            A chi crede che ambiente e giustizia sociale debbano stare insieme.<br>
            A chi vuole contribuire, anche senza essere un esperto.<br><br>
            Serve portare idee.<br>
            Esperienze, bisogni, soluzioni.<br>
        block_6:
          title: Da dove partiamo
          description: |-
            Grazie a Decidiamo puoi contribuire a definire i  grandi temi che riguardano le vite di tutte e tutti noi e il futuro del Paese, tra cui:<br><br>
            - Clima ed energia <br>
            - Territorio, città, casa e beni comuni, partecipazione, democrazia <br>
            - Mobilità <br>
            - Economia circolare e rifiuti zero<br>
            - Lavoro<br>
            - Impresa e politica industriale<br>
            - Fiscalità giusta e lotta alle disuguaglianze<br>
            - Diritti, parità e libertà<br>
            - Salute, sanità territoriale e inquinamento<br>
            - Scuola, università, cultura e conoscenza <br>
            - Legalità, trasparenza ed ecomafie<br>
            - Migrazioni, accoglienza ed Europa dei diritti<br>
            - Pace, politica estera ed Europa<br>
            - Intelligenza artificiale & digitalizzazione, innovazione<br>
            - Welfare, enti locali e aree interne<br>
            - Agricoltura, biodiversità e diritti degli animali
        block_7:
          title: Il programma non si annuncia soltanto. Si costruisce insieme. Contattaci
          description: |-
            Le prossime elezioni non si preparano con formule vuote o slogan già pronti.<br>
            Si preparano mettendo in comune idee, bisogni, competenze, conflitti, visioni.<br><br>
            <strong>Decidiamo</strong> è lo spazio in cui tutto questo può diventare proposta politica.<br>
            Con metodo. Con trasparenza. Con responsabilità.<br><br>
            <strong>Entra, partecipa, proponi.</strong><br>
            Perché il programma che vogliamo deve nascere anche da te.
